  }
  * { box-sizing: border-box; }
  body { font: 14px/1.5 -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--fg); margin: 0; padding: 40px 24px; }
  .wrap { max-width: 880px; margin: 0 auto; }
  h1 { font-size: 28px; margin: 0 0 6px; letter-spacing: -0.5px; }
  .lede { color: var(--muted); margin: 0 0 24px; }
  .panel { background: #161618; border: 1px solid var(--line); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; }
  .name { font-weight: 600; font-size: 16px; min-width: 220px; }
  .count { color: var(--muted); font-size: 13px; min-width: 130px; }
  .status { color: var(--muted); font-size: 13px; flex: 1; }
  .status.ok { color: var(--ok); }
  .status.warn { color: var(--warn); }
  button { background: var(--accent); color: #fff; border: 0; padding: 10px 18px; border-radius: 6px; font: 600 13px/1 inherit; cursor: pointer; }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .all { background: #fff; color: #000; }
  .toolbar { display: flex; gap: 12px; margin: 0 0 24px; align-items: center; }
  .toolbar .hint { color: var(--muted); font-size: 13px; }
  code { background: #1c1c1f; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>

  <div class="toolbar">
    <button class="all" onclick="downloadAll()">⬇ Tout télécharger (séquentiel)</button>
    <span class="hint">Allume les téléchargements multiples si Chrome demande la permission.</span>
  </div>

const rows = document.getElementById('rows');
const state = {};

function basename(url) {
  const u = decodeURIComponent(url.split('/').pop());
  return u.replace(/[^\w.\-]/g, '_');
}

for (const [city, urls] of Object.entries(CITIES)) {
  const row = document.createElement('div');
  row.className = 'panel';
  row.innerHTML = `
    <div class="name">${city}</div>
    <div class="count">${urls.length} image${urls.length>1?'s':''}</div>
    <div class="status" id="s_${city}">Prêt</div>
    <button onclick="downloadCity('${city}')">⬇ ZIP</button>
  `;
  rows.appendChild(row);
}

async function downloadCity(city) {
  const urls = CITIES[city];
  const s = document.getElementById('s_' + city);
  s.className = 'status'; s.textContent = 'Téléchargement…';
  const zip = new JSZip();
  let okCount = 0, errCount = 0;
  for (let i = 0; i < urls.length; i++) {
    const url = urls[i];
    s.textContent = `Téléchargement ${i+1}/${urls.length}…`;
    try {
      const r = await fetch(url);
      if (!r.ok) { errCount++; continue; }
      const buf = await r.arrayBuffer();
      zip.file(basename(url), buf);
      okCount++;
    } catch (e) { errCount++; console.error(url, e); }
  }
  s.textContent = `Zippage de ${okCount} fichier${okCount>1?'s':''}…`;
  const blob = await zip.generateAsync({ type: 'blob' });
  const u = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = u; a.download = `remax_villes_${city}.zip`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(u), 3000);
  s.className = 'status ' + (errCount ? 'warn' : 'ok');
  s.textContent = `✓ ZIP téléchargé · ${okCount} image${okCount>1?'s':''}` + (errCount ? ` · ${errCount} échec${errCount>1?'s':''}` : '');
}

async function downloadAll() {
  for (const city of Object.keys(CITIES)) {
    await downloadCity(city);
    await new Promise(r => setTimeout(r, 800));
  }
}
