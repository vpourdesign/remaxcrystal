// ------------------ Budget advisor ------------------
// Chaque pub est splittée en N audiences (ad sets) lors du setup Meta
const AUDIENCES_PER_AD = 2;

// Seuils de budget journalier PAR AUDIENCE (ad set) en $ CAD
// Calibrés pour un contexte de petit budget, mais assez pour que Meta puisse optimiser
const BUDGET_THRESHOLDS = {
  conversion: { critical: 1.0, warning: 3.0, label: 'Conversion' },
  traffic:    { critical: 0.5, warning: 1.5, label: 'Trafic' },
  notoriete:  { critical: 0.3, warning: 0.8, label: 'Notoriété' },
  ig_profil:  { critical: 0.5, warning: 1.5, label: 'IG Profil' },
};

const auditBudget = (ad) => {
  const warnings = [];
  for (const camp of ad.campaign_types) {
    const daily = ad.daily_budget_per_campaign[camp] || 0;
    const dailyPerAudience = daily / AUDIENCES_PER_AD;
    const t = BUDGET_THRESHOLDS[camp];
    if (!t) continue;
    let severity = null;
    if (dailyPerAudience < t.critical) severity = 'critical';
    else if (dailyPerAudience < t.warning) severity = 'warning';
    if (!severity) continue;

    const total = ad.budget_allocation[camp];
    const targetDaily = t.warning; // target = le seuil OK minimum
    const neededTotal = Math.ceil(targetDaily * AUDIENCES_PER_AD * ad.duration_days);
    const newDuration = Math.max(1, Math.floor(total / (targetDaily * AUDIENCES_PER_AD)));
    const mergedDaily = daily; // si on fusionne en 1 audience, daily reste daily mais va à 1 ad set
    warnings.push({
      campaign: camp, severity, daily, dailyPerAudience, total,
      threshold_critical: t.critical, threshold_warning: t.warning,
      suggestions: {
        increase: { newTotal: neededTotal, delta: neededTotal - total, targetDaily },
        shorten:  { newDuration, daysShaved: ad.duration_days - newDuration, targetDaily },
        merge:    { dailyIfMerged: mergedDaily, worksIfMerged: mergedDaily >= t.warning },
      }
    });
  }
  return warnings;
};

const worstSeverity = (warnings) => {
  if (warnings.some(w => w.severity === 'critical')) return 'critical';
  if (warnings.length > 0) return 'warning';
  return null;
};

// ------------------ Reach estimator ------------------
// CPM moyens Montréal 18-34, 2024-2025, en CAD
const CPM_ESTIMATES = {
  notoriete:  { low: 4,  high: 10 },  // Awareness / Reach
  traffic:    { low: 8,  high: 18 },  // Link clicks
  conversion: { low: 15, high: 45 },  // Purchase — Meta cible les acheteurs
  ig_profil:  { low: 10, high: 25 },  // Profile visits
};

const estimateReach = (ad) => {
  const days = ad.duration_days;
  // Fréquence moyenne selon la durée du flight
  let frequency = 1.75;
  if (days > 7 && days <= 21) frequency = 2.5;
  else if (days > 21) frequency = 3.5;

  let impressionsLow = 0, impressionsHigh = 0;
  for (const camp of ad.campaign_types) {
    const budget = ad.budget_allocation[camp];
    const cpm = CPM_ESTIMATES[camp];
    if (!cpm || !budget) continue;
    impressionsLow  += budget * 1000 / cpm.high; // haut CPM = moins d'impressions
    impressionsHigh += budget * 1000 / cpm.low;  // bas CPM = plus d'impressions
  }
  // Facteur de chevauchement si plusieurs campagnes (même pub vue dans plusieurs contextes)
  const overlap = ad.campaign_types.length > 1 ? 0.7 : 1.0;
  const reachLow  = Math.round(impressionsLow  / frequency * overlap);
  const reachHigh = Math.round(impressionsHigh / frequency * overlap);
  return { low: reachLow, high: reachHigh, frequency, impressionsLow, impressionsHigh };
};

const fmtReach = (n) => {
  if (n < 1000) return Math.round(n).toLocaleString('fr-CA');
  if (n < 10000) return (n/1000).toFixed(1).replace('.',',') + ' k';

// Build full gallery for an ad: 1:1 creative + 9:16 creative(s) (including all slideshow slides)
const buildGallery = (adId) => {
  const map = CREATIVE_MAP[adId];
  if (!map) return [];
  const gallery = [];
  const push = (creative, aspect, sectionLabel, slideIdx, slideTotal) => {
    if (!creative) return;
    if (creative.type === 'slideshow' && creative.slides) {
      creative.slides.forEach((s, i) => gallery.push({ ...s, aspect, section: sectionLabel, slideIdx: i, slideTotal: creative.slides.length }));
    } else {
      gallery.push({ ...creative, aspect, section: sectionLabel });
    }
  };
  push(map.one_one, 'square', 'Feed 1:1');
  push(map.nine_sixteen, 'portrait', 'Story 9:16');
  return gallery;
};

const Lightbox = ({ gallery, startIdx=0, onClose }) => {
  const [idx, setIdx] = useState(startIdx);
  const total = gallery.length;
  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowLeft') setIdx(i => (i-1+total)%total);
      if (e.key === 'ArrowRight') setIdx(i => (i+1)%total);
      if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [total, onClose]);
  if (!total) return null;
  const item = gallery[idx];
  return (
    <div className="fixed inset-0 z-[70] bg-black/95 flex items-center justify-center fade-in">
      {/* Close */}
      <button onClick={onClose} aria-label="Fermer"
        className="absolute top-5 right-5 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center z-10">
        <Icon name="close" size={20} />
      </button>

      {/* Prev */}
      <button onClick={()=>setIdx((idx-1+total)%total)} aria-label="Précédent"
        className="absolute left-5 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center text-2xl font-light z-10">‹</button>

      {/* Next */}
      <button onClick={()=>setIdx((idx+1)%total)} aria-label="Suivant"
        className="absolute right-5 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center text-2xl font-light z-10">›</button>

      {/* Media */}
      <div className="max-w-[85vw] max-h-[85vh] flex items-center justify-center" onClick={(e)=>e.stopPropagation()}>
        {item.type === 'video' ? (
          <video src={item.src} poster={item.poster} controls autoPlay className="max-w-full max-h-[85vh] rounded-lg shadow-2xl" />
        ) : (
          <img src={item.src} alt="" className="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl" />
        )}
      </div>

      {/* Caption bar */}
      <div className="absolute bottom-5 left-1/2 -translate-x-1/2 flex items-center gap-3 bg-black/70 backdrop-blur rounded-full px-5 py-3 text-white text-sm">
        <span className="font-semibold">{item.section}</span>
        {item.slideIdx != null && <span className="text-white/60">· slide {item.slideIdx+1}/{item.slideTotal}</span>}
        {item.label && <span className="text-white/60 font-mono text-xs">· {item.label}</span>}
        <span className="text-white/40 mx-2">|</span>
        <span className="tabular-nums text-white/80">{idx+1}/{total}</span>
      </div>
    </div>
  );
};

// Build groups by headline (used in grouped view + Gantt)
const buildHeadlineGroups = (ads) => {
  const map = new Map();
  for (const ad of ads) {
    const key = (ad.headline || '(sans titre)').trim();
    if (!map.has(key)) {
      map.set(key, {
        headline: key, event_id: ad.event_id, ads: [],
        minStart: ad.date_start, maxEnd: ad.date_end, totalBudget: 0,
        campaignTypesSet: new Set(), formatsSet: new Set(),
      });
    }
    const g = map.get(key);
    g.ads.push(ad);
    if (new Date(ad.date_start + 'T00:00:00') < new Date(g.minStart + 'T00:00:00')) g.minStart = ad.date_start;
    if (new Date(ad.date_end + 'T00:00:00') > new Date(g.maxEnd + 'T00:00:00')) g.maxEnd = ad.date_end;
    g.totalBudget += ad.budget_allocation.total;
    ad.campaign_types.forEach(c => g.campaignTypesSet.add(c));
    g.formatsSet.add(ad.format);
  }
  return [...map.values()].map(g => {
    const days = Math.round((new Date(g.maxEnd + 'T00:00:00') - new Date(g.minStart + 'T00:00:00')) / 86400000) + 1;
    return {
      ...g,
      campaign_types: [...g.campaignTypesSet],
      formats: [...g.formatsSet],
      duration_days: days,
      dailyBudget: g.totalBudget / days,
      flagship: !!EVENTS_MAP[g.event_id]?.flagship,
    };
  });
};

// ------------------ Grouped Ad Card (same-headline ads collapsed) ------------------
const GroupedAdCard = ({ group, approvals, setApprovals, onFirstAdClick, onLightbox, onBudgetWarning }) => {
  const event = EVENTS_MAP[group.event_id];
  const ids = group.ads.map(a => a.id);
  const multi = ids.length > 1;

  // Combined budget allocation
  const comb = { notoriete: 0, traffic: 0, conversion: 0, ig_profil: 0, total: 0 };
  for (const ad of group.ads) {
    for (const k of Object.keys(comb)) comb[k] += ad.budget_allocation[k] || 0;
  }

  // Approval state
  const statuses = group.ads.map(a => approvals[a.id] || 'pending');
  const aCount = statuses.filter(s => s === 'approved').length;
  const rCount = statuses.filter(s => s === 'rejected').length;
  let combStatus = 'pending';
  if (aCount === group.ads.length) combStatus = 'approved';
  else if (rCount === group.ads.length) combStatus = 'rejected';
  else if (aCount > 0 || rCount > 0) combStatus = 'mixed';

  const approveAll = () => {
    const next = { ...approvals };
    const target = combStatus === 'approved' ? 'pending' : 'approved';
    ids.forEach(id => next[id] = target);
    setApprovals(next);
  };
  const rejectAll = () => {
    const next = { ...approvals };
    const target = combStatus === 'rejected' ? 'pending' : 'rejected';
    ids.forEach(id => next[id] = target);
    setApprovals(next);
  };

  // Creative status
  const allOneOne = group.ads.every(a => a.creative_assets.visual_1x1_ready);
  const allStory  = group.ads.every(a => a.creative_assets.story_9x16_ready);

  // Reach estimate on combined pseudo-ad
  const reach = estimateReach({
    campaign_types: group.campaign_types,
    budget_allocation: comb,
    duration_days: group.duration_days,
  });

  // Audit budget — aggregate warnings per campaign (use combined daily for warnings)
  const pseudoAdForAudit = {
    campaign_types: group.campaign_types,
    budget_allocation: comb,
    daily_budget_per_campaign: Object.fromEntries(group.campaign_types.map(c => [c, comb[c] / group.duration_days])),
    duration_days: group.duration_days,
  };
  const warnings = auditBudget(pseudoAdForAudit);

  const onWarnClick = () => onBudgetWarning({
    ...pseudoAdForAudit,
    id: ids.join(' + '),
    headline: group.headline,
  }, warnings);

  // Pick first ad for creative preview & click
  const firstAd = group.ads[0];

  return (
    <div className="card bg-white rounded-2xl border border-ac-line overflow-hidden fade-in">
      <div className="p-5">
        <div className="flex items-start justify-between gap-3 mb-3">
          <div className="min-w-0">
            <div className="flex items-center gap-2 mb-1 flex-wrap">

                {multi ? `${ids.length} pubs · ${ids.join(' + ')}` : ids[0]}
              </span>
              {group.flagship && <Pill className="bg-yellow-100 text-yellow-800 ring-transparent">⭐ Flagship</Pill>}
              <BudgetWarningBadge warnings={warnings} onClick={onWarnClick} />
            </div>
            <div className="font-semibold text-[15px] leading-snug line-clamp-2">{group.headline}</div>
            {event && (
              <div className="mt-1 text-xs text-ac-muted">{event.name}{event.date ? ` · ${fmtDate(event.date)}` : ''}</div>
            )}
          </div>
          <ApprovalPill status={combStatus === 'mixed' ? 'pending' : combStatus} />
        </div>

        <div className="mb-3 cursor-zoom-in" onClick={(e)=>{ e.stopPropagation(); onLightbox(firstAd.id, 0); }} title="Cliquer pour agrandir (pub principale)">
          <CreativeStrip adId={firstAd.id} />
        </div>

        <div className="flex flex-wrap gap-1.5 mb-3">
          {group.campaign_types.map(c => <CampaignPill key={c} id={c} />)}
          {group.formats.map(f => <FormatPill key={f} format={f} />)}
        </div>

        <div className="grid grid-cols-3 gap-2 mb-3 text-xs">
          <div>
            <div className="text-ac-muted">Dates</div>
            <div className="font-medium">{fmtDate(group.minStart)} → {fmtDate(group.maxEnd)}</div>
            <div className="text-ac-muted">{group.duration_days} jours</div>
          </div>
          <div>
            <div className="text-ac-muted">Budget combiné</div>
            <div className="font-semibold text-base tabular-nums">{fmt$2(comb.total)}</div>
            <div className="text-ac-muted tabular-nums">{fmt$2(comb.total / group.duration_days)}/jour</div>
          </div>
          <div title={`Fréquence ~${reach.frequency}x · ${Math.round(reach.impressionsLow).toLocaleString('fr-CA')}–${Math.round(reach.impressionsHigh).toLocaleString('fr-CA')} impressions`}>
            <div className="text-ac-muted">Reach estimé</div>
            <div className="font-semibold text-base tabular-nums">{fmtReach(reach.low)}–{fmtReach(reach.high)}</div>
            <div className="text-ac-muted tabular-nums">freq. ~{reach.frequency}x</div>
          </div>
        </div>

        <div className="flex flex-wrap gap-2 mb-3 text-xs">
          {comb.notoriete > 0 && <div className="px-2 py-1 rounded bg-rose-50 text-rose-700 tabular-nums">N: {fmt$(comb.notoriete)}</div>}
          {comb.traffic > 0 && <div className="px-2 py-1 rounded bg-sky-50 text-sky-700 tabular-nums">T: {fmt$(comb.traffic)}</div>}
          {comb.conversion > 0 && <div className="px-2 py-1 rounded bg-emerald-50 text-emerald-700 tabular-nums">C: {fmt$(comb.conversion)}</div>}
          {comb.ig_profil > 0 && <div className="px-2 py-1 rounded bg-amber-50 text-amber-700 tabular-nums">IG: {fmt$(comb.ig_profil)}</div>}
        </div>

        <div className="flex flex-wrap gap-2 text-xs mb-4">
          <Pill className={allOneOne ? 'bg-emerald-50 text-emerald-700 ring-transparent' : 'bg-red-50 text-red-700 ring-transparent'}>1:1 {allOneOne ? '✓' : '✗'}</Pill>
          <Pill className={allStory ? 'bg-emerald-50 text-emerald-700 ring-transparent' : 'bg-red-50 text-red-700 ring-transparent'}>9:16 {allStory ? '✓' : '✗'}</Pill>
          {combStatus === 'mixed' && <Pill className="bg-violet-50 text-violet-700 ring-transparent">⚠ Approbations mixtes</Pill>}
        </div>

        <div className="flex items-center gap-2 pt-3 border-t border-ac-line">
          <button onClick={onFirstAdClick} className="flex-1 px-3 py-2 rounded-lg text-xs font-semibold bg-stone-50 hover:bg-stone-100 text-ac-ink transition-colors">
            Détails ({ids.length})

          <button onClick={approveAll} className={`px-3 py-2 rounded-lg text-xs font-semibold transition-colors ${combStatus==='approved' ? 'bg-emerald-500 text-white' : 'bg-emerald-50 hover:bg-emerald-100 text-emerald-700'}`}>
            ✓ Approuver {multi ? 'tout' : ''}

          <button onClick={rejectAll} className={`px-3 py-2 rounded-lg text-xs font-semibold transition-colors ${combStatus==='rejected' ? 'bg-rose-500 text-white' : 'bg-rose-50 hover:bg-rose-100 text-rose-700'}`}>
            ✗ Rejeter {multi ? 'tout' : ''}
          </button>
        </div>
      </div>
    </div>
  );
};

// ------------------ Gantt chart ------------------
const GanttChart = ({ ads, onAdClick, onLightbox }) => {
  if (!ads?.length) return null;

  // Compute timeline bounds (day granularity)
  const parse = (iso) => new Date(iso + 'T00:00:00');
  const minDate = new Date(Math.min(...ads.map(a => parse(a.date_start).getTime())));
  const maxDate = new Date(Math.max(...ads.map(a => parse(a.date_end).getTime())));
  const totalDays = Math.ceil((maxDate - minDate) / 86400000) + 1;

  const dayOffset = (iso) => Math.round((parse(iso) - minDate) / 86400000);

  // Build month headers
  const months = [];
  const cursor = new Date(minDate);
  while (cursor <= maxDate) {
    const mkey = `${cursor.getFullYear()}-${cursor.getMonth()}`;
    const existing = months.find(m => m.key === mkey);
    if (existing) {
      existing.days++;
    } else {
      months.push({ key: mkey, label: ['jan','fév','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'][cursor.getMonth()], year: cursor.getFullYear(), days: 1 });
    }
    cursor.setDate(cursor.getDate() + 1);
  }

  // Week markers (Monday of each week)
  const weekMarkers = [];
  const c2 = new Date(minDate);
  while (c2 <= maxDate) {
    if (c2.getDay() === 1) { // Monday
      weekMarkers.push(Math.round((c2 - minDate) / 86400000));
    }
    c2.setDate(c2.getDate() + 1);
  }

  // Group ads by exact headline — same headline = same creative story = 1 bar
  const groupMap = new Map();
  for (const ad of ads) {
    const key = (ad.headline || '(sans titre)').trim();
    if (!groupMap.has(key)) {
      groupMap.set(key, {
        headline: key,
        event_id: ad.event_id,
        ads: [],
        minStart: ad.date_start,
        maxEnd: ad.date_end,
        totalBudget: 0,
        campaignTypesSet: new Set(),
        formatsSet: new Set(),
      });
    }
    const g = groupMap.get(key);
    g.ads.push(ad);
    if (parse(ad.date_start) < parse(g.minStart)) g.minStart = ad.date_start;
    if (parse(ad.date_end) > parse(g.maxEnd)) g.maxEnd = ad.date_end;
    g.totalBudget += ad.budget_allocation.total;
    ad.campaign_types.forEach(c => g.campaignTypesSet.add(c));
    g.formatsSet.add(ad.format);
  }
  const groups = [...groupMap.values()].map(g => ({
    ...g,
    campaign_types: [...g.campaignTypesSet],
    formats: [...g.formatsSet],
    duration: Math.round((parse(g.maxEnd) - parse(g.minStart)) / 86400000) + 1,
    flagship: !!EVENTS_MAP[g.event_id]?.flagship,
  }));
  groups.forEach(g => { g.dailyBudget = g.totalBudget / g.duration; });

  // Sort by start then duration desc
  const sorted = groups.sort((a, b) => {
    const diff = parse(a.minStart) - parse(b.minStart);
    return diff !== 0 ? diff : b.duration - a.duration;
  });

  const dayWidthPct = 100 / totalDays;

  // Color per primary campaign (conversion > notoriete > traffic > ig_profil)
  const barColor = (grp) => {
    if (grp.flagship) return 'bg-gradient-to-r from-yellow-400 to-amber-500';
    if (grp.campaign_types.includes('conversion')) return 'bg-gradient-to-r from-emerald-400 to-emerald-600';
    if (grp.campaign_types.includes('traffic')) return 'bg-gradient-to-r from-sky-400 to-sky-600';
    if (grp.campaign_types.includes('notoriete')) return 'bg-gradient-to-r from-rose-400 to-rose-600';
    return 'bg-gradient-to-r from-stone-400 to-stone-600';
  };

  return (
    <div className="mt-10 bg-white rounded-2xl border border-ac-line overflow-hidden">
      <div className="px-6 py-4 border-b border-ac-line">
        <div className="text-xs font-semibold uppercase tracking-wider text-ac-muted mb-1">Timeline</div>
        <h2 className="text-lg font-bold">Diffusion des pubs dans le temps</h2>
        <p className="text-xs text-ac-muted mt-1">Du {parse(minDate.toISOString().split('T')[0]).toLocaleDateString('fr-CA',{day:'numeric',month:'long'})} au {maxDate.toLocaleDateString('fr-CA',{day:'numeric',month:'long'})} · {totalDays} jours · {ads.length} pubs</p>
      </div>

      <div className="overflow-x-auto">
        <div style={{ minWidth: 900 }}>
          {/* Header row: months + weeks (plein largeur) */}
          <div className="sticky top-0 bg-stone-50 border-b border-ac-line z-10 relative" style={{ height: 40 }}>
            {/* Month segments */}
            <div className="flex h-5 border-b border-ac-line">
              {months.map(m => (
                <div key={m.key} style={{ width: `${(m.days / totalDays) * 100}%` }}
                  className="text-[11px] font-bold text-ac-ink px-2 flex items-center border-r border-ac-line capitalize">
                  {m.label} {m.year !== new Date().getFullYear() && m.year}
                </div>
              ))}
            </div>
            {/* Week tick marks */}
            <div className="h-5 relative">
              {weekMarkers.map((d, i) => (
                <div key={i} className="absolute top-0 bottom-0 border-l border-stone-300" style={{ left: `${d * dayWidthPct}%` }}>
                  <span className="text-[9px] text-ac-muted ml-1">S{i+1}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Rows (groupées par headline) */}
          <div>
            {sorted.map((g, idx) => {
              const start = dayOffset(g.minStart);
              const width = g.duration;
              const adIds = g.ads.map(a => a.id).join(' + ');
              const multi = g.ads.length > 1;
              return (
                <div key={adIds} className={`border-b border-ac-line hover:bg-stone-50/60 transition-colors ${idx%2===0 ? '' : 'bg-stone-50/30'}`}>
                  <div className="relative" style={{ minHeight: 48 }}>
                    {/* Week grid lines */}
                    {weekMarkers.map((d, i) => (
                      <div key={i} className="absolute top-0 bottom-0 border-l border-stone-200/60" style={{ left: `${d * dayWidthPct}%` }}></div>
                    ))}
                    {/* Bar */}
                    <div
                      onClick={()=>onAdClick(g.ads[0])}
                      className={`absolute top-1.5 bottom-1.5 ${barColor(g)} rounded-lg shadow-sm cursor-pointer hover:shadow-md hover:brightness-110 transition-all flex items-center px-3 overflow-hidden gap-2`}
                      style={{ left: `${start * dayWidthPct}%`, width: `${width * dayWidthPct}%` }}
                      title={`${g.headline}\n${adIds}\n${g.minStart} → ${g.maxEnd} (${g.duration}j)\nBudget combiné: ${fmt$2(g.totalBudget)}\n${g.formats.join(' + ')}`}
                    >
                      <span className="text-[10px] font-mono text-white/80 flex-none">
                        {multi ? `${g.ads.length} pubs` : g.ads[0].id}
                      </span>
                      {g.flagship && <span className="flex-none">⭐</span>}
                      <span className="text-white text-[12px] font-semibold truncate drop-shadow flex-1 min-w-0">{g.headline}</span>
                      <span className="text-white text-[11px] font-bold tabular-nums drop-shadow flex-none bg-black/20 px-1.5 py-0.5 rounded">
                        {g.duration}j · {fmt$2(g.dailyBudget)}/j · {fmt$(g.totalBudget)}
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="px-6 py-3 border-t border-ac-line flex flex-wrap gap-3 items-center text-[11px] text-ac-muted">
        <span className="font-semibold">Légende:</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-gradient-to-r from-yellow-400 to-amber-500"></span>Flagship</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-gradient-to-r from-emerald-400 to-emerald-600"></span>Conversion</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-gradient-to-r from-sky-400 to-sky-600"></span>Trafic</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-gradient-to-r from-rose-400 to-rose-600"></span>Notoriété</span>
        <span className="ml-auto italic">Clic sur une barre ou un titre pour voir le détail</span>
      </div>
    </div>
  );
};

      {/* Filter bar */}
      <div className="bg-white rounded-2xl border border-ac-line p-4 mb-5">

          <div className="flex items-center gap-2 flex-1 min-w-60">

          </div>
          <Select label="Événement" value={filter.event} onChange={v=>setFilter({...filter, event:v})}

                  <span className={`text-xs font-semibold uppercase tracking-wider ${p.text}`}>{p.label}</span>
                  <span className="text-xs text-ac-muted">·</span>
                  <span className="text-xs font-medium text-ac-muted">{q.category}</span>
                </div>
                <Pill className={note.status === 'answered' || q.status === 'answered' ? 'bg-emerald-50 text-emerald-700 ring-transparent' : q.status === 'parked' ? 'bg-gray-100 text-gray-600 ring-transparent' : 'bg-amber-50 text-amber-700 ring-transparent'}>
                  {note.status === 'answered' ? 'Répondue' : q.status === 'parked' ? 'Sur la glace' : 'Ouverte'}
                </Pill>
              </div>

              <div className="font-semibold text-base mb-3 leading-snug">{q.question}</div>

              <div className="text-sm text-ac-muted mb-4 leading-relaxed"><strong className="text-ac-ink">Pourquoi ça compte :</strong> {q.why_it_matters}</div>

              <div>
                <div className="text-xs font-semibold uppercase tracking-wider text-ac-muted mb-2">Réponse du client / Notes</div>
                <textarea value={note.answer || ''} onChange={e=>updateNote(q.id, { answer: e.target.value, status: e.target.value ? 'answered' : 'open' })}
                  placeholder="Noter ici la réponse ou les commentaires du client…"
                  className="w-full border border-ac-line rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-ac-accent/30 min-h-[80px] bg-stone-50/50" />
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

                strokeDasharray={`${dash} ${circ-dash}`}

            acc += dash;
            return el;

          </div>
          <div className="text-xs text-ac-muted italic">Du lancement à la clôture, le poids des objectifs évolue.</div>
        </div>

        <div className="bg-white rounded-2xl border border-ac-line p-6 overflow-hidden">
          {/* Timeline Gantt empilée — une rangée par phase, pas d'overlap visuel */}
          {(() => {
            // Build month headers from minD/maxD
            const months = [];
            const cur = new Date(minD);
            const monthLabels = ['jan','fév','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'];
            while (cur <= maxD) {
              const mkey = `${cur.getFullYear()}-${cur.getMonth()}`;
              const existing = months.find(x => x.key === mkey);
              if (existing) { existing.days++; }
              else { months.push({ key: mkey, label: monthLabels[cur.getMonth()], year: cur.getFullYear(), days: 1 }); }
              cur.setDate(cur.getDate() + 1);
            }
            return (
              <div className="mb-8">
                {/* En-tête : axe des mois */}
                <div className="flex mb-2" style={{ paddingLeft: 150 }}>
                  {months.map(m => (
                    <div key={m.key} className="border-l border-ac-line first:border-l-0 px-2 text-[10px] font-bold uppercase tracking-wider text-ac-muted"
                      style={{ width: `${(m.days/totalDays)*100}%` }}>
                      {m.label}
                    </div>
                  ))}
                </div>
                {/* Rangées de phases */}
                <div className="space-y-2">
                  {phases.map(p => {
                    const start = (parse(p.date_start) - minD) / 86400000;
                    const dur = (parse(p.date_end) - parse(p.date_start)) / 86400000 + 1;
                    const leftPct = (start / totalDays) * 100;
                    const widthPct = (dur / totalDays) * 100;
                    const c = PhaseColors[p.color];
                    return (
                      <div key={p.id} className="flex items-center gap-3">
                        {/* Label de phase à gauche */}
                        <div className="flex-none text-right" style={{ width: 138 }}>
                          <div className={`text-[11px] font-bold uppercase tracking-wider ${c.text}`}>{p.label}</div>
                          <div className="text-[10px] text-ac-muted tabular-nums">{fmtDate(p.date_start)} → {fmtDate(p.date_end)}</div>
                        </div>
                        {/* Track Gantt */}
                        <div className="flex-1 relative bg-stone-50 rounded-lg" style={{ height: 36 }}>
                          {/* Lignes verticales mois */}
                          {months.slice(0, -1).reduce((acc, m, i) => {
                            const offset = acc.offset + m.days;
                            acc.lines.push(
                              <div key={i} className="absolute top-0 bottom-0 border-l border-stone-200" style={{ left: `${(offset/totalDays)*100}%` }}></div>

                            acc.offset = offset;
                            return acc;

                          {/* Barre de la phase */}
                          <div className={`absolute top-1 bottom-1 ${c.bg} rounded-md shadow-sm flex items-center justify-center text-white text-xs font-bold px-2`}

                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

            );

                      <span className="text-ac-muted">Pubs</span>
                      <span className="font-semibold tabular-nums">{b.ad_count}</span>

                    <div className="flex items-center justify-between text-xs">
                      <span className="text-ac-muted">Durée</span>
                      <span className="font-semibold tabular-nums">{p.duration_days} j</span>
                    </div>
                  </div>
                  <div className="mt-3 pt-3 border-t border-stone-200/60">
                    <div className="text-[10px] uppercase tracking-wider text-ac-muted font-bold mb-1.5">Focus</div>
                    <div className="flex flex-wrap gap-1">
                      {focusOrdered.map(c => <CampaignPill key={c} id={c} />)}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Objectifs Meta */}
      <div>
        <div className="flex items-baseline justify-between mb-4">
          <div>
            <div className="text-[10px] uppercase tracking-widest text-ac-muted font-bold">Section 2</div>
            <h3 className="text-xl font-bold">4 objectifs Meta · répartition du budget</h3>
          </div>
        </div>
        <div className="bg-white rounded-2xl border border-ac-line p-6">
          <CampaignDonut />
        </div>

        {/* Détails objectifs */}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
          {['notoriete','traffic','conversion','ig_profil'].map(k => {
            const c = CAMPAIGN_COLORS[k];
            const ct = DATA.campaign_types[k];
            const b = byCamp[k];
            const pct = (b.budget_total/budgetTotal)*100;
            return (
              <div key={k} className={`rounded-2xl border border-ac-line bg-white p-5`}>
                <div className="flex items-start justify-between mb-2">
                  <div className="flex items-center gap-2">
                    <span className={`w-3 h-3 rounded-full ${c.dot}`}></span>
                    <div>
                      <div className="font-bold text-base">{c.name}</div>
                      <div className="text-[11px] text-ac-muted">{ct.meta_objective}</div>
                    </div>
                  </div>
                  <div className="text-right">
                    <div className="text-xl font-bold tabular-nums">{fmt$(b.budget_total)}</div>
                    <div className="text-[11px] text-ac-muted">{pct.toFixed(0)} % · {b.ad_count} pub{b.ad_count>1?'s':''}</div>
                  </div>
                </div>
                <div className="h-2 bg-stone-100 rounded-full overflow-hidden mt-3">
                  <div className={`h-full ${c.bar}`} style={{width:`${pct}%`}}></div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Mix formats */}
      <div>
        <div className="flex items-baseline justify-between mb-4">
          <div>
            <div className="text-[10px] uppercase tracking-widest text-ac-muted font-bold">Section 3</div>
            <h3 className="text-xl font-bold">3 formats créatifs · à quoi sert chacun</h3>
          </div>
        </div>
        <FormatMix />
      </div>

      {/* Budget par phase — barres */}
      <div>
        <div className="flex items-baseline justify-between mb-4">
          <div>
            <div className="text-[10px] uppercase tracking-widest text-ac-muted font-bold">Section 4</div>
            <h3 className="text-xl font-bold">Évolution du mix par phase</h3>
          </div>
          <div className="text-xs text-ac-muted italic">Comment le poids des objectifs change dans le temps.</div>
        </div>
        <div className="bg-white rounded-2xl border border-ac-line p-6">
          <div className="space-y-5">
            {phases.map(p => {
              const b = phaseBudgets[p.id];
              const segments = [
                { key:'notoriete',  v:b.notoriete,  color:'#f43f5e' },
                { key:'traffic',    v:b.traffic,    color:'#0ea5e9' },
                { key:'conversion', v:b.conversion, color:'#10b981' },
                { key:'ig_profil',  v:b.ig_profil,  color:'#f59e0b' },
              ];
              const max = Math.max(...phases.map(p2 => phaseBudgets[p2.id].total));
              const rowPct = (b.total / max) * 100;
              return (
                <div key={p.id}>
                  <div className="flex items-baseline justify-between mb-1">
                    <div className="text-sm font-bold">{p.label} <span className="text-ac-muted font-normal">· {p.name}</span></div>
                    <div className="text-sm tabular-nums font-bold">{fmt$(b.total)}</div>
                  </div>
                  <div className="flex h-9 rounded-lg overflow-hidden border border-ac-line" style={{width: `${rowPct}%`}}>
                    {segments.filter(s=>s.v>0).map(s => (
                      <div key={s.key}
                        className="flex items-center justify-center text-white text-[11px] font-bold"
                        style={{ background: s.color, width: `${(s.v/b.total)*100}%` }}
                        title={`${CAMPAIGN_COLORS[s.key].name} : ${fmt$(s.v)}`}>
                        {(s.v/b.total)>=0.15 ? fmt$(s.v) : ''}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
          <div className="mt-6 flex flex-wrap gap-4 text-xs text-ac-muted pt-4 border-t border-ac-line">
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded" style={{background:'#f43f5e'}}></span>Notoriété</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded" style={{background:'#0ea5e9'}}></span>Trafic</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded" style={{background:'#10b981'}}></span>Conversion (RSVP événement FB)</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded" style={{background:'#f59e0b'}}></span>IG Profil (croissance)</span>
          </div>
        </div>
      </div>

      {/* Logique stratégique */}
      <div>
        <div className="flex items-baseline justify-between mb-4">
          <div>
            <div className="text-[10px] uppercase tracking-widest text-ac-muted font-bold">Section 5</div>
            <h3 className="text-xl font-bold">Pourquoi cette stratégie</h3>
          </div>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
          <div className="bg-white rounded-2xl border border-ac-line p-5">
            <div className="text-3xl mb-2">🌱</div>
            <div className="font-bold text-base mb-2">Pages à zéro = priorité notoriété</div>
            <p className="text-sm text-ac-muted leading-relaxed">
              Les pages FB et IG PVM démarrent sans audience. Les premières semaines sont donc consacrées à <strong>construire la communauté</strong> (notoriété + IG profil) avant de pouvoir activer des campagnes efficaces de trafic et de conversion.
            </p>
          </div>
          <div className="bg-white rounded-2xl border border-ac-line p-5">
            <div className="text-3xl mb-2">⭐</div>
            <div className="font-bold text-base mb-2">Investir sur les moments clés</div>
            <p className="text-sm text-ac-muted leading-relaxed">
              Le budget n'est pas dilué par micro-événement. Il se concentre sur le <strong>lancement de saison</strong>, la <strong>soirée d'ouverture PLAYBLACK</strong>, la <strong>programmation globale</strong> (carrousels) et les <strong>moments spéciaux</strong> comme Throwback Shorties.
            </p>
          </div>
          <div className="bg-white rounded-2xl border border-ac-line p-5">
            <div className="text-3xl mb-2">📈</div>
            <div className="font-bold text-base mb-2">Évolution vers conversion FB</div>
            <p className="text-sm text-ac-muted leading-relaxed">
              À mesure que les communautés grandissent, le mix évolue vers <strong>trafic et engagement</strong> avec les événements Facebook (RSVP). En août, la conversion est l'objectif principal pour maximiser la présence sur place et clôturer la saison.
            </p>
          </div>
        </div>
      </div>

      {/* Plan créatif suggéré */}
      <div>
        <div className="flex items-baseline justify-between mb-4 flex-wrap gap-3">
          <div>
            <div className="text-[10px] uppercase tracking-widest text-ac-muted font-bold">Section 6</div>
            <h3 className="text-xl font-bold">Plan créatif suggéré · 13 pubs à produire</h3>
          </div>
          <div className="text-xs text-ac-muted italic max-w-md text-right">Pas de promotion par événement individuel. Le plan regroupe les annonces autour du lancement, de la programmation globale et des moments clés.</div>
        </div>

        <div className="space-y-6">
          {DATA.phases.map(p => {
            const c = PhaseColors[p.color];
            const phaseAds = DATA.ads.filter(a => (a.phase||'').startsWith(p.label));
            const phaseTotal = phaseAds.reduce((s,a)=>s+a.budget_allocation.total, 0);
            return (
              <div key={p.id} className={`rounded-2xl border ${c.border} overflow-hidden bg-white`}>
                <div className={`${c.bg} text-white px-5 py-3 flex items-center justify-between`}>
                  <div>
                    <div className="text-[10px] uppercase tracking-widest font-bold opacity-80">{p.label}</div>
                    <div className="font-bold text-base">{p.name}</div>
                  </div>
                  <div className="text-right text-xs">
                    <div className="font-bold tabular-nums text-base">{fmt$(phaseTotal)}</div>
                    <div className="opacity-80">{phaseAds.length} pub{phaseAds.length>1?'s':''} · {fmtDate(p.date_start)} → {fmtDate(p.date_end)}</div>
                  </div>
                </div>
                <div className="divide-y divide-ac-line">
                  {phaseAds.map(ad => {
                    const plan = CREATIVE_PLAN[ad.id] || {};
                    const fs = FormatStrategy[ad.format];
                    return (
                      <div key={ad.id} className="grid grid-cols-1 md:grid-cols-[120px_1fr_240px] gap-4 p-5">
                        {/* Format thumb */}
                        <div className="flex md:flex-col items-center md:items-start gap-3">
                          <div className={`w-full aspect-square rounded-xl flex flex-col items-center justify-center ${fs.color}`}>
                            <div className="text-3xl mb-1">{fs.icon}</div>
                            <div className="text-[10px] font-bold uppercase tracking-wider">{fs.label}</div>
                          </div>
                          <div className="text-[10px] font-mono text-ac-muted md:mt-1">{ad.id}</div>
                        </div>

                        {/* Message */}
                        <div className="min-w-0">
                          <div className="flex flex-wrap gap-1.5 mb-2">
                            {ad.campaign_types.map(ct => <CampaignPill key={ct} id={ct} />)}
                            <Pill className="bg-stone-100 text-stone-700 ring-transparent">{fmt$(ad.budget_allocation.total)} · {ad.duration_days} j</Pill>
                          </div>
                          <div className="font-bold text-[15px] leading-snug mb-1">{plan.title || ad.headline}</div>
                          <div className="text-[11px] uppercase tracking-wider text-ac-muted font-bold mb-1 mt-3">Message descriptif</div>
                          <p className="text-sm text-ac-ink leading-relaxed whitespace-pre-line">{plan.message || ad.copy}</p>
                        </div>

                        {/* Visual brief */}
                        <div className="bg-stone-50 rounded-xl p-4 border border-ac-line">
                          <div className="text-[11px] uppercase tracking-wider text-ac-muted font-bold mb-2 flex items-center gap-1.5">
                            <span>🎨</span> Visuel à produire
                          </div>
                          <p className="text-xs text-ac-ink leading-relaxed">{plan.visual || 'À définir'}</p>
                          {plan.formats_needed && (
                            <div className="mt-3 pt-3 border-t border-ac-line">
                              <div className="text-[10px] uppercase tracking-wider text-ac-muted font-bold mb-1">Formats requis</div>
                              <div className="flex flex-wrap gap-1.5">
                                {plan.formats_needed.map(f => (
                                  <span key={f} className="text-[10px] font-mono bg-white px-2 py-0.5 rounded border border-ac-line">{f}</span>
                                ))}
                              </div>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* Récap visuels par format */}
        <div className="mt-6 grid grid-cols-1 md:grid-cols-3 gap-3">
          {['statique','carrousel','video'].map(k => {
            const fmtAds = DATA.ads.filter(a => a.format === k);
            const fs = FormatStrategy[k];
            return (
              <div key={k} className="rounded-2xl border border-ac-line bg-white p-5">
                <div className="flex items-center gap-3 mb-2">
                  <span className="text-3xl">{fs.icon}</span>
                  <div>
                    <div className="font-bold text-base">{fmtAds.length} × {fs.label}</div>
                    <div className="text-[11px] text-ac-muted">à produire</div>
                  </div>
                </div>
                <ul className="text-xs text-ac-muted space-y-1 mt-3 leading-relaxed">
                  {fmtAds.map(a => (
                    <li key={a.id} className="flex gap-2"><span className="text-ac-muted font-mono">·</span><span>{(CREATIVE_PLAN[a.id]||{}).title || a.headline}</span></li>
                  ))}
                </ul>
              </div>
            );
          })}
        </div>
      </div>

      {/* Audience */}
      <div>
        <div className="flex items-baseline justify-between mb-4">
          <div>
            <div className="text-[10px] uppercase tracking-widest text-ac-muted font-bold">Section 7</div>
            <h3 className="text-xl font-bold">Cible · centre-ville Montréal</h3>
          </div>
        </div>
        <div className="bg-white rounded-2xl border border-ac-line p-6">
          <div className="font-bold text-base mb-3">{DATA.audiences[0].label}</div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            {DATA.audiences[0].composition.map((c, i) => (
              <div key={i} className="rounded-xl bg-stone-50 p-4 border border-ac-line">
                <div className="text-[10px] uppercase tracking-wider text-ac-muted font-bold mb-1">{c.type.replace('_',' ')}</div>
                <div className="font-bold text-sm mb-1">{c.label}</div>
                <div className="text-xs text-ac-muted leading-relaxed">{c.description}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Synthèse / call to action */}
      <div className="bg-ac-ink text-white rounded-3xl p-8">
        <div className="text-[10px] uppercase tracking-widest text-white/60 font-bold mb-2">Approbation</div>
        <h3 className="text-2xl font-extrabold mb-3">Validez la stratégie pour démarrer la production des créatifs</h3>
        <p className="text-sm text-white/80 leading-relaxed max-w-2xl mb-6">
          Une fois cette stratégie validée, les 13 créatifs (statiques, carrousels, vidéo) peuvent être briefés et produits. La mise en ligne des premières pubs est prévue le <strong className="text-white">25 mai 2026</strong>.
        </p>
        <div className="flex flex-wrap gap-3 text-xs">
          <div className="px-4 py-2 rounded-full bg-white/10 backdrop-blur">📅 Démarrage : 25 mai 2026</div>
          <div className="px-4 py-2 rounded-full bg-white/10 backdrop-blur">💰 Budget : 3 000$ CAD</div>
          <div className="px-4 py-2 rounded-full bg-white/10 backdrop-blur">🎯 5 phases · 13 pubs</div>
          <div className="px-4 py-2 rounded-full bg-white/10 backdrop-blur">📍 Cible : centre-ville MTL 25-45</div>
        </div>
      </div>

    </div>
  );
};

// ------------------ App ------------------
const App = () => {
  const [tab, setTab] = useState('approbation');
  const [approvals, setApprovals] = useState(() => loadLS(LS_KEYS.approvals, {}));
  const [selectedAd, setSelectedAd] = useState(null);
  const [lightbox, setLightbox] = useState(null); // { gallery, idx }
  const [budgetWarning, setBudgetWarning] = useState(null); // { ad, warnings }

  const openLightbox = useCallback((adId, startIdx=0) => {
    const gallery = buildGallery(adId);
    if (gallery.length) setLightbox({ gallery, idx: startIdx });
  }, []);
  const openBudgetWarning = useCallback((ad, warnings) => {
    setBudgetWarning({ ad, warnings });
  }, []);

  useEffect(() => saveLS(LS_KEYS.approvals, approvals), [approvals]);

  const approvedCount = DATA.ads.filter(a => approvals[a.id] === 'approved').length;
  const rejectedCount = DATA.ads.filter(a => approvals[a.id] === 'rejected').length;
  const pendingCount = DATA.ads.length - approvedCount - rejectedCount;

  const exportApprovals = () => {
    const exportData = {
      exported_at: new Date().toISOString(),
      month: DATA.meta.month,
      approvals: DATA.ads.map(a => ({
        id: a.id,
        event: EVENTS_MAP[a.event_id]?.name,
        headline: a.headline,
        status: approvals[a.id] || 'pending',
      })),
      questions_notes: loadLS(LS_KEYS.questions, {}),
    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pvm-2026-approbations-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const resetAll = () => {
    if (confirm('Réinitialiser toutes les approbations et notes ?')) {
      localStorage.removeItem(LS_KEYS.approvals);
      localStorage.removeItem(LS_KEYS.questions);
      setApprovals({});
      alert('Réinitialisé. Recharger la page pour voir les changements des notes.');
    }
  };

  const tabs = [
    { id:'approbation', label:'Approbation client', icon:'check' },
    { id:'overview',  label:'Vue d\'ensemble',   icon:'chart' },
    { id:'ads',       label:'Pubs',              icon:'check', count: DATA.ads.length },
    { id:'budgets',   label:'Budgets',           icon:'dollar' },
    { id:'questions', label:'Questions client',  icon:'question', count: DATA.client_questions.filter(q=>q.status==='open').length },
  ];

  return (
    <div className="min-h-screen bg-ac-bg">
      {/* Header */}
      <header className="border-b border-ac-line bg-white sticky top-0 z-30 backdrop-blur bg-white/90">
        <div className="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
          <div>
            <div className="text-xs font-semibold uppercase tracking-[0.2em] text-ac-muted">PVM · Place Ville Marie · Campagne Meta</div>
            <h1 className="text-2xl font-bold tracking-tight">Dashboard d'approbation — Saison 2026</h1>
          </div>
          <div className="flex items-center gap-3">
            <div className="text-right">
              <div className="text-xs text-ac-muted">État des approbations</div>
              <div className="flex items-center gap-3 text-sm mt-0.5">
                <span className="text-emerald-600 font-semibold">{approvedCount} ✓</span>
                <span className="text-rose-600 font-semibold">{rejectedCount} ✗</span>
                <span className="text-amber-600 font-semibold">{pendingCount} ⏱</span>
              </div>
            </div>
            <button onClick={exportApprovals} className="px-4 py-2 text-sm font-semibold bg-ac-ink text-white rounded-lg hover:bg-black transition-colors inline-flex items-center gap-2">
              <Icon name="download" size={14} /> Exporter
            </button>
            <button onClick={resetAll} title="Réinitialiser" className="px-3 py-2 text-xs text-ac-muted hover:text-ac-ink">↺</button>
          </div>
        </div>
        <nav className="max-w-7xl mx-auto px-6">
          <div className="flex gap-1 border-t border-ac-line/50">
            {tabs.map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`px-4 py-3 text-sm font-medium border-b-2 transition-colors inline-flex items-center gap-2 ${tab===t.id ? 'border-ac-ink text-ac-ink' : 'border-transparent text-ac-muted hover:text-ac-ink'}`}>
                <Icon name={t.icon} size={14} />
                {t.label}
                {t.count != null && (
                  <span className={`text-xs px-1.5 py-0.5 rounded-full ${tab===t.id ? 'bg-ac-ink text-white' : 'bg-stone-100 text-ac-muted'}`}>{t.count}</span>
                )}
              </button>
            ))}
          </div>
        </nav>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-8 pb-20">
        {tab === 'approbation' && <ApprobationClientTab />}
        {tab === 'overview' && <OverviewTab />}
        {tab === 'ads' && <AdsTab approvals={approvals} setApprovals={setApprovals} selectedAd={selectedAd} setSelectedAd={setSelectedAd} onLightbox={openLightbox} onBudgetWarning={openBudgetWarning} />}
        {tab === 'budgets' && <BudgetsTab />}
        {tab === 'questions' && <QuestionsTab />}
      </main>

      {selectedAd && (
        <AdDetail ad={selectedAd}
          approval={approvals[selectedAd.id] || 'pending'}
          onClose={()=>setSelectedAd(null)}
          onApprove={()=>{ setApprovals({...approvals, [selectedAd.id]: approvals[selectedAd.id]==='approved' ? 'pending' : 'approved'}); }}
          onReject={()=>{ setApprovals({...approvals, [selectedAd.id]: approvals[selectedAd.id]==='rejected' ? 'pending' : 'rejected'}); }}
          onLightbox={openLightbox}
        />
      )}

      {lightbox && (
        <Lightbox gallery={lightbox.gallery} startIdx={lightbox.idx} onClose={()=>setLightbox(null)} />
      )}

      {budgetWarning && (
        <BudgetWarningModal ad={budgetWarning.ad} warnings={budgetWarning.warnings} onClose={()=>setBudgetWarning(null)} />
      )}

      <footer className="max-w-7xl mx-auto px-6 pb-10 text-xs text-ac-muted">
        <div>Source: Stratégie PVM 2026 — Business Manager dédié (séparé Aire Commune) · Période 25 mai → 2 sept 2026 · Généré le {DATA.meta.generated_at} · Les approbations et notes sont enregistrées localement (localStorage) sur ce navigateur.</div>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
