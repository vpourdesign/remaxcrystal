const TabReach = () => {
  const camps = DATA.campaigns.map(c => {
    const b = BUCKET_BY_ID[c.bucket_id];
    const benchmark = REACH_DATA.benchmarks[c.bucket_id];
    let impressions, reach, clicks, ctr, interactions, extra;

    if (c.bucket_id === 'notoriete') {
      impressions = Math.round(c.budget / benchmark.cpm * 1000);
      reach = Math.round(impressions / benchmark.freq);
      clicks = Math.round(impressions * benchmark.ctr);
      ctr = (benchmark.ctr * 100).toFixed(2);
      interactions = Math.round(reach * benchmark.eng_rate);
      extra = { label: 'Vues vidéo (3s)', value: Math.round(impressions * 0.32).toLocaleString('fr-CA') };
    } else if (c.bucket_id === 'trafic') {
      clicks = Math.round(c.budget / benchmark.cpc);
      impressions = Math.round(clicks / benchmark.ctr);
      reach = Math.round(impressions / benchmark.freq);
      ctr = (benchmark.ctr * 100).toFixed(2);
      interactions = Math.round(clicks * 1.4);
      extra = { label: 'Coût par clic', value: fmt$2(benchmark.cpc) };
    } else {
      clicks = Math.round(c.budget / benchmark.cpc);
      impressions = Math.round(clicks / benchmark.ctr);
      reach = Math.round(impressions / benchmark.freq);
      ctr = (benchmark.ctr * 100).toFixed(2);
      interactions = Math.round(clicks * 1.6);
      extra = { label: 'Leads estimés', value: Math.round(clicks * benchmark.lead_rate) };
